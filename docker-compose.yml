version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: faak-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: FaakDb
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d FaakDb"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: faak-backend
    environment:
      - ConnectionStrings__DefaultConnection=Host=db;Database=FaakDb;Username=postgres;Password=postgres
      - Jwt__Key=ThisIsASecretKeyForJwtAuthenticationInFaakApp!
      - Jwt__Issuer=FaakIssuer
      - Jwt__Audience=FaakAudience
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: /api
    container_name: faak-frontend
    environment:
      - NEXT_PUBLIC_API_URL=/api
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: faak-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend

volumes:
  postgres-data:
